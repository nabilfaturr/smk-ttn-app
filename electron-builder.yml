appId: com.smkttn.absensi-nilai
productName: Sistem Absensi dan Penilaian SMK TTN
copyright: Copyright © 2025 SMK Taruna Tekno Nusantara
directories:
  output: dist
  buildResources: build
files:
  - dist-electron
  - dist
asar: true
asarUnpack:
  - "**/data/**"
  - "**/node_modules/better-sqlite3/**"
  - "**/rapor-template.docx"
win:
  target: nsis
  icon: build/icon.ico
linux:
  target: AppImage
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  artifactName: ${productName}-${version}-Setup.${ext}
